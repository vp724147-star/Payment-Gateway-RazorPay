name: .NET Build, Test & Docker CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "RAZORPAY_KEY=${{ secrets.RAZORPAY_KEY }}" >> $GITHUB_ENV
          echo "RAZORPAY_SECRET=${{ secrets.RAZORPAY_SECRET }}" >> $GITHUB_ENV
          echo "RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" >> $GITHUB_ENV
          echo "DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore RazorpayPaymentGateway/RazorpayPaymentGateway.csproj

      - name: Build and Test
        run: dotnet test PaymentGateway.Tests/PaymentGateway.Tests.csproj --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish RazorpayPaymentGateway/RazorpayPaymentGateway.csproj -c Release -o publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t razorpay-api -f RazorpayPaymentGateway/Dockerfile .

      - name: Push to DockerHub
        run: |
          docker tag razorpay-api ${{ secrets.DOCKER_USERNAME }}/razorpay-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/razorpay-api:latest

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build
          path: publish/
